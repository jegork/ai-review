name: Cleanup container images

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ai-review
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
